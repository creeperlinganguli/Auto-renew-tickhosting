name: Auto Renew Tickhosting

on:
  schedule:
    # Runs every 45 minutes to keep your +1h renewal active
    - cron: '*/45 * * * *'
  workflow_dispatch: 

permissions:
  contents: write 

jobs:
  Auto_renew_tickhosting:
    runs-on: windows-latest 
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3 # Updated to v3 for better stability
      with:
        fetch-depth: 0
        
    - name: Set up Python
      uses: actions/setup-python@v4 # Updated to v4
      with:
        python-version: '3.10'
        
    - name: Install Chrome
      uses: browser-actions/setup-chrome@latest
      
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run auto renew script
      env:
        EMAIL: ${{ secrets.EMAIL }}
        PASSWORD: ${{ secrets.PASSWORD }}
        PTERODACTYL_SESSION: ${{ secrets.PTERODACTYL_SESSION }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python auto_renew.py

    - name: Commit and push if changed
      shell: bash # Use bash to make git commands more reliable on Windows runner
      run: |
        git config --local user.email "github-actions[bot]@://github.com"
        git config --local user.name "github-actions[bot]"
        git add last_renew_data.txt
        if git diff --cached --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Auto Update by Github Actions"
          git push origin main
        fi
